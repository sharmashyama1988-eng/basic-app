<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amisphere</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module" src="./auth.js"></script>
</head>

<body>
    <div class="top-nav">
        <a href="https://mail.google.com" target="_blank">Gmail</a>
        <a href="https://images.google.com" target="_blank">Images</a>
        <button id="login-btn" class="login-btn btn-blue" onclick="window.handleSignIn()">Sign In</button>
        <div id="user-profile" class="user-profile" style="display: none;"></div>
    </div>

    <div class="home-container">
        <!-- Logo mimicking Google colors -->
        <h1 class="logo">
            <span>A</span><span>m</span><span>i</span><span>s</span><span>p</span><span>h</span><span>e</span><span>r</span><span>e</span>
        </h1>

        <form action="results.html" method="GET" class="search-form">
            <div class="search-box-container" style="position: relative; width: 600px; max-width: 90%; margin: 0 auto;">
                <div class="search-box" style="width: 100%; max-width: 100%; border-radius: 24px;">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" name="q" id="search-input" class="search-input" autofocus required
                        autocomplete="off" title="Search">
                    <i class="fa-solid fa-microphone search-icon"
                        style="color: #4285f4; cursor: pointer; margin-right: 0;" onclick="startVoiceSearch()"></i>
                </div>
                <div id="autocomplete-box" class="autocomplete-suggestions"
                    style="display:none; position: absolute; top: 100%; left: 0; right: 0; background-color: var(--bg-color); color: var(--text-color); border: 1px solid var(--border-color); border-top: none; border-radius: 0 0 24px 24px; box-shadow: 0 4px 6px rgba(32, 33, 36, .28); z-index: 999; text-align: left; overflow: hidden;">
                </div>
            </div>

            <div class="buttons" style="text-align: center;">
                <input type="submit" class="btn" value="Amisphere Search">
                <input type="button" class="btn" value="I'm Feeling Lucky"
                    onclick="window.location.href='results.html?q=Special Result'">
            </div>
        </form>
    </div>
    <script src="./app.js"></script>
</body>

</html>
